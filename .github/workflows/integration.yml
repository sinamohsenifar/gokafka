name: Integration

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate test TLS material
        run: |
          bash scripts/gen-test-certs.sh
          keytool -list -keystore docker/secrets/kafka.keystore.jks \
            -storepass "$(tr -d '\n' < docker/secrets/kafka_keystore_creds)" >/dev/null

      - name: Start Kafka stack
        env:
          KAFKA_IMAGE: apache/kafka:4.1.2
        run: |
          set -euo pipefail
          docker compose pull kafka
          # Broker startup occasionally flakes on shared runners (the container
          # exits early or doesn't bind in time). Retry up to 3 times, recreating.
          start_kafka() {
            docker compose up -d --force-recreate kafka
            for i in $(seq 1 120); do
              state=$(docker compose ps -a kafka --format '{{.State}}' 2>/dev/null | head -1 || true)
              case "$state" in
                exited|dead) return 1 ;;
              esac
              if docker compose exec -T kafka /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1; then
                echo "kafka ready (poll $i)"
                return 0
              fi
              sleep 2
            done
            return 1
          }
          ok=0
          for attempt in 1 2 3; do
            if start_kafka; then ok=1; break; fi
            echo "kafka start attempt $attempt failed; recent state/logs:"
            docker compose ps -a || true
            docker compose logs --tail=80 kafka || true
            docker compose rm -sf kafka || true
          done
          if [ "$ok" -ne 1 ]; then
            echo "kafka failed to start after 3 attempts"
            exit 1
          fi
          docker compose pull schema-registry
          docker compose up -d schema-registry
          docker compose run --rm kafka-init

      - name: Wait for Kafka and Schema Registry
        run: |
          for port in 9092 9093 9094 9095; do
            for i in $(seq 1 45); do
              if bash -c "echo > /dev/tcp/localhost/${port}" 2>/dev/null; then
                echo "listener :${port} ready"
                break
              fi
              sleep 2
              if [ "$i" -eq 45 ]; then
                echo "listener :${port} not ready"
                docker compose logs
                exit 1
              fi
            done
          done
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8081/apis/ccompat/v6/subjects >/dev/null; then
              echo "schema registry ready"
              exit 0
            fi
            sleep 2
          done
          echo "schema registry not ready"
          docker compose logs schema-registry
          exit 1

      - name: Wait for SCRAM user bootstrap
        run: docker compose logs kafka-init || true

      - name: Integration tests
        env:
          KAFKA_BROKERS: 127.0.0.1:9092
          KAFKA_BROKERS_PLAINTEXT: 127.0.0.1:9092
          KAFKA_BROKERS_SSL: 127.0.0.1:9093
          KAFKA_BROKERS_SASL_PLAINTEXT: 127.0.0.1:9094
          KAFKA_BROKERS_SASL_SSL: 127.0.0.1:9095
          SCHEMA_REGISTRY_URL: http://127.0.0.1:8081/apis/ccompat/v6
          GOKAFKA_SECRETS_DIR: ${{ github.workspace }}/docker/secrets
        run: go test -tags=integration -race -count=1 -timeout=5m -p=1 ./...

      - name: Stop stack
        if: always()
        run: docker compose down -v

  # Redpanda is wire-compatible with the Kafka protocol. This lane proves GoKafka
  # works against it: the suite passes, skipping APIs Redpanda does not implement
  # (ElectLeaders, delegation tokens, KIP-848/932) and the TLS/SASL listeners,
  # which aren't configured here.
  redpanda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Start Redpanda
        run: |
          set -euo pipefail
          docker run -d --name redpanda \
            -p 9092:9092 -p 8081:8081 \
            redpandadata/redpanda:latest \
            redpanda start --mode dev-container --smp 1 --overprovisioned \
            --kafka-addr external://0.0.0.0:9092 \
            --advertise-kafka-addr external://127.0.0.1:9092 \
            --schema-registry-addr 0.0.0.0:8081
          for i in $(seq 1 60); do
            if docker exec redpanda rpk cluster health 2>/dev/null | grep -q "Healthy:.*true"; then
              echo "redpanda healthy (poll $i)"; break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then echo "redpanda not healthy"; docker logs redpanda; exit 1; fi
          done
          docker exec redpanda rpk version

      - name: Integration tests (Redpanda)
        env:
          KAFKA_BROKERS: 127.0.0.1:9092
          SCHEMA_REGISTRY_URL: http://127.0.0.1:8081
        run: go test -tags=integration -race -count=1 -timeout=8m -p=1 .

      - name: Stop Redpanda
        if: always()
        run: docker rm -f redpanda || true
