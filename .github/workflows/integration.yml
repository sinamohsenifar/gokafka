name: Integration

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate test TLS material
        run: |
          bash scripts/gen-test-certs.sh
          keytool -list -keystore docker/secrets/kafka.keystore.jks \
            -storepass "$(tr -d '\n' < docker/secrets/kafka_keystore_creds)" >/dev/null

      - name: Start Kafka stack
        env:
          KAFKA_IMAGE: apache/kafka:4.1.2
        run: |
          set -euxo pipefail
          docker compose pull kafka
          docker compose up -d kafka
          for i in $(seq 1 180); do
            state=$(docker compose ps -a kafka --format '{{.State}}' 2>/dev/null | head -1 || true)
            case "$state" in
              exited|dead)
                echo "kafka container failed (state=$state):"
                docker compose ps -a
                docker compose logs --tail=120 kafka
                exit 1
                ;;
            esac
            if docker compose exec -T kafka /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1; then
              echo "kafka ready (attempt $i)"
              break
            fi
            sleep 2
            if [ "$i" -eq 180 ]; then
              echo "kafka not ready (state=${state:-unknown})"
              docker compose logs --tail=120 kafka
              exit 1
            fi
          done
          docker compose pull schema-registry
          docker compose up -d schema-registry
          docker compose run --rm kafka-init

      - name: Wait for Kafka and Schema Registry
        run: |
          for port in 9092 9093 9094 9095; do
            for i in $(seq 1 45); do
              if bash -c "echo > /dev/tcp/localhost/${port}" 2>/dev/null; then
                echo "listener :${port} ready"
                break
              fi
              sleep 2
              if [ "$i" -eq 45 ]; then
                echo "listener :${port} not ready"
                docker compose logs
                exit 1
              fi
            done
          done
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8081/apis/ccompat/v6/subjects >/dev/null; then
              echo "schema registry ready"
              exit 0
            fi
            sleep 2
          done
          echo "schema registry not ready"
          docker compose logs schema-registry
          exit 1

      - name: Wait for SCRAM user bootstrap
        run: docker compose logs kafka-init || true

      - name: Integration tests
        env:
          KAFKA_BROKERS: 127.0.0.1:9092
          KAFKA_BROKERS_PLAINTEXT: 127.0.0.1:9092
          KAFKA_BROKERS_SSL: 127.0.0.1:9093
          KAFKA_BROKERS_SASL_PLAINTEXT: 127.0.0.1:9094
          KAFKA_BROKERS_SASL_SSL: 127.0.0.1:9095
          SCHEMA_REGISTRY_URL: http://127.0.0.1:8081/apis/ccompat/v6
          GOKAFKA_SECRETS_DIR: ${{ github.workspace }}/docker/secrets
        run: go test -tags=integration -race -count=1 -timeout=5m -p=1 ./...

      - name: Stop stack
        if: always()
        run: docker compose down -v
